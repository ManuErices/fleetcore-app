<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 155">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
  </defs>

  <!-- Hexagon pointy-top, radius 42, center 130,55 -->
  <polygon points="130,13 166,34 166,76 130,97 94,76 94,34"
    fill="url(#hexGrad)" filter="url(#shadow)"/>

  <!-- ── Document icon ────────────────────────────────────────── -->
  <!-- Main page body (white) with folded top-right corner -->
  <path d="M113,35 L140,35 L148,43 L148,74 L113,74 Z" fill="white" opacity="0.97"/>
  <!-- Folded corner triangle (slightly darker teal) -->
  <path d="M140,35 L148,43 L140,43 Z" fill="#0e7490" opacity="0.55"/>
  <!-- Fold crease line -->
  <line x1="140" y1="35" x2="148" y2="43" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>

  <!-- Text lines on the document -->
  <!-- Line 1 (full width) -->
  <rect x="118" y="49" width="22" height="3" rx="1.5" fill="#0e7490" opacity="0.85"/>
  <!-- Line 2 (full width) -->
  <rect x="118" y="56" width="22" height="3" rx="1.5" fill="#0e7490" opacity="0.85"/>
  <!-- Line 3 (shorter) -->
  <rect x="118" y="63" width="15" height="3" rx="1.5" fill="#0e7490" opacity="0.6"/>

  <!-- Small header block at top of document (title bar) -->
  <rect x="118" y="38" width="13" height="5" rx="1" fill="#0891b2" opacity="0.6"/>

  <!-- ── Typography ────────────────────────────────────────────── -->
  <!-- "Fleet" dark bold + "Core-I" teal bold -->
  <text x="130" y="117"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="26" font-weight="900" text-anchor="middle">
    <tspan fill="#1e293b">Fleet</tspan><tspan fill="#0891b2">Core-I</tspan>
  </text>

  <!-- Tagline -->
  <text x="130" y="136"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5" font-weight="700" text-anchor="middle"
    fill="#0891b2" letter-spacing="1.6">EL NÚCLEO DE TUS INFORMES</text>
</svg>
